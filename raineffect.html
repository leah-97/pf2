<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <canvas id="rain"></canvas>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #0a0a0a; /* 어두운 배경에서 비가 잘 보임 */
      }
      #rain {
        position: fixed;
        top: 0;
        left: 0;
      }
    </style>

    <script>
      // 캔버스 설정
      const canvas = document.getElementById("rain");
      const ctx = canvas.getContext("2d");

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      // 빗줄기 배열
      const drops = [];
      const dropCount = 200; // 비의 개수

      // 초기 빗줄기 설정
      for (let i = 0; i < dropCount; i++) {
        drops.push({
          x: Math.random() * canvas.width, // x 위치
          y: Math.random() * canvas.height, // y 위치
          length: Math.random() * 20 + 10, // 빗줄기 길이
          speed: Math.random() * 5 + 5, // 떨어지는 속도
          wind: Math.random() * 2 - 1, // 바람 효과(좌우)
        });
      }

      function rain() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "rgba(180, 180, 255, 0.7)";
        ctx.lineWidth = 1;
        ctx.lineCap = "round";

        drops.forEach((d) => {
          ctx.beginPath();
          ctx.moveTo(d.x, d.y);
          ctx.lineTo(d.x + d.wind, d.y + d.length);
          ctx.stroke();

          // 빗줄기 움직임
          d.y += d.speed;
          d.x += d.wind * 0.5;

          // 화면 아래로 내려가면 다시 위로 이동
          if (d.y > canvas.height) {
            d.y = -20;
            d.x = Math.random() * canvas.width;
          }
        });

        requestAnimationFrame(rain);
      }

      rain();
    </script>
  </body>
</html>
